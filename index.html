<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#845EC2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Star Speaker">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Star Speaker - ฝึกพูดภาษาอังกฤษ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --sky:#6dd5fa; --sky2:#2980b9; --sun:#FFD93D; --mint:#6BCB77;
    --purple:#845EC2; --peach:#FF9671; --dark:#2d2d5e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(160deg,#a8edea 0%,#fed6e3 100%);
    min-height:100vh; overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
    padding:16px 12px 40px;
  }
  .cloud{position:fixed;background:white;border-radius:50px;opacity:.5;animation:floatCloud linear infinite;z-index:0;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
  .cloud1{width:100px;height:35px;top:6%;animation-duration:30s;animation-delay:-10s;}
  .cloud1::before{width:50px;height:50px;top:-20px;left:15px;}
  .cloud1::after{width:35px;height:35px;top:-12px;left:45px;}
  .cloud2{width:80px;height:28px;top:22%;animation-duration:40s;animation-delay:-20s;}
  .cloud2::before{width:40px;height:40px;top:-16px;left:10px;}
  .cloud2::after{width:28px;height:28px;top:-10px;left:38px;}
  .cloud3{width:120px;height:40px;top:58%;animation-duration:25s;animation-delay:-5s;}
  .cloud3::before{width:60px;height:60px;top:-25px;left:18px;}
  .cloud3::after{width:42px;height:42px;top:-15px;left:55px;}
  @keyframes floatCloud{from{left:-200px}to{left:110%}}

  .wrapper{position:relative;z-index:1;width:100%;max-width:520px;}

  /* Header */
  .header{text-align:center;margin-bottom:14px;animation:bounceIn .6s ease;}
  .header h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--dark);text-shadow:3px 3px 0 rgba(255,255,255,.7);}
  .header p{font-size:.95rem;color:var(--purple);font-weight:700;margin-top:2px;}
  .mascot{font-size:3.5rem;display:block;animation:wiggle 2s ease-in-out infinite;}

  /* Score bar */
  .stars-bar{background:white;border-radius:20px;padding:10px 18px;display:flex;align-items:center;
    justify-content:space-between;margin-bottom:14px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);border:3px solid var(--sun);}
  .stars-label{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--dark);white-space:nowrap;}
  .stars-count{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--sun);
    text-shadow:1px 1px 0 #e0a800;display:flex;align-items:center;gap:4px;white-space:nowrap;}
  .progress-bar{background:#eee;border-radius:20px;height:10px;flex:1;margin:0 10px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#FFD93D,#FF6B6B);border-radius:20px;
    transition:width .5s cubic-bezier(.68,-.55,.27,1.55);}

  /* Level tabs */
  .levels-row{display:flex;gap:8px;margin-bottom:12px;}
  .level-btn{flex:1;background:white;border:3px solid #ddd;border-radius:14px;padding:8px 4px;
    font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;transition:all .2s;color:#888;text-align:center;}
  .level-btn.active{border-color:var(--purple);background:linear-gradient(135deg,#f5f0ff,#e8deff);
    color:var(--purple);transform:scale(1.04);}

  /* Category grid */
  .cat-section{background:white;border-radius:22px;padding:16px;margin-bottom:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.1);animation:slideUp .35s ease;}
  .cat-section h3{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--dark);margin-bottom:12px;text-align:center;}
  .cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .cat-btn{background:#f8f4ff;border:2px solid #ddd;border-radius:12px;padding:8px 3px 7px;
    cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif;}
  .cat-btn:hover{border-color:var(--purple);transform:scale(1.05);}
  .cat-btn.active{border-color:var(--purple);background:linear-gradient(135deg,#f0e8ff,#e0d0ff);
    transform:scale(1.06);box-shadow:0 3px 10px rgba(132,94,194,.25);}
  .cat-btn .cat-emoji{font-size:1.4rem;display:block;margin-bottom:2px;}
  .cat-btn .cat-name{font-size:.63rem;font-weight:800;color:#666;line-height:1.2;}
  .cat-btn.active .cat-name{color:var(--purple);}

  /* Word card */
  .card{background:white;border-radius:28px;padding:22px 18px;margin-bottom:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.12);text-align:center;animation:slideUp .4s ease;}
  .card-top{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
  .level-badge{background:linear-gradient(135deg,var(--purple),#c77dff);color:white;
    font-family:'Fredoka One',cursive;font-size:.8rem;padding:3px 12px;border-radius:20px;}
  .cat-badge{background:linear-gradient(135deg,var(--peach),#ff6b35);color:white;
    font-family:'Fredoka One',cursive;font-size:.8rem;padding:3px 12px;border-radius:20px;}
  .word-emoji{font-size:5rem;display:block;margin:8px 0;filter:drop-shadow(3px 4px 0 rgba(0,0,0,.1));}
  .word-display{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--dark);margin:4px 0;line-height:1.1;}
  .word-phonetic{font-size:.95rem;color:var(--purple);font-weight:600;margin-top:4px;
    background:#f5f0ff;display:inline-block;padding:2px 12px;border-radius:20px;}
  .word-thai{font-size:1rem;color:#888;font-weight:700;margin-top:4px;}

  /* Attempt dots */
  .attempt-indicator{display:flex;justify-content:center;gap:8px;margin:10px 0 4px;}
  .attempt-dot{width:12px;height:12px;border-radius:50%;background:#eee;border:2px solid #ddd;transition:all .3s;}
  .attempt-dot.used{background:#ffb3b3;border-color:#FF6B6B;}
  .attempt-dot.active{background:#FF6B6B;border-color:#cc0000;transform:scale(1.2);}

  /* Buttons */
  .btn-listen{background:linear-gradient(135deg,var(--sky),var(--sky2));color:white;border:none;
    border-radius:50px;padding:11px 24px;font-family:'Fredoka One',cursive;font-size:1rem;
    cursor:pointer;margin:12px 6px 0;box-shadow:0 4px 0 rgba(0,0,0,.15);transition:all .15s;
    display:inline-flex;align-items:center;gap:7px;}
  .btn-listen:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .btn-record{background:linear-gradient(135deg,#FF6B6B,#ee0979);color:white;border:none;
    border-radius:50px;padding:13px 28px;font-family:'Fredoka One',cursive;font-size:1.1rem;
    cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.2);transition:all .15s;
    display:inline-flex;align-items:center;gap:9px;margin-top:6px;}
  .btn-record:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
  .btn-record.recording{animation:pulse-rec 1s ease infinite;}
  .btn-record:disabled{opacity:.4;cursor:not-allowed;}
  @keyframes pulse-rec{
    0%,100%{box-shadow:0 5px 0 rgba(0,0,0,.2),0 0 0 0 rgba(255,0,0,.3);}
    50%{box-shadow:0 5px 0 rgba(0,0,0,.2),0 0 0 12px rgba(255,0,0,0);}
  }
  .mic-wave{display:none;font-size:1.3rem;}
  .btn-record.recording .mic-wave{display:inline;}
  .speak-hint{font-size:.8rem;color:#aaa;margin-top:8px;font-weight:600;}

  /* Result */
  .result-box{display:none;border-radius:22px;padding:16px 14px 12px;margin-top:14px;
    text-align:center;animation:bounceIn .5s ease;}
  .result-box.show{display:block;}
  .star-rating-display{display:flex;justify-content:center;gap:5px;margin-bottom:7px;}
  .rating-star{font-size:2.6rem;filter:grayscale(1) opacity(.3);transition:all .3s;transform:scale(.8);}
  .rating-star.lit{filter:none;transform:scale(1.1);}
  .rating-star.lit.bounce{animation:starBounce .5s ease;}
  @keyframes starBounce{0%{transform:scale(.5) rotate(-20deg);}60%{transform:scale(1.3) rotate(10deg);}100%{transform:scale(1.1) rotate(0deg);}}
  .result-title{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:3px;}
  .result-subtitle{font-size:.9rem;font-weight:700;opacity:.8;}
  .result-spoken{font-size:.8rem;opacity:.6;margin-top:3px;}
  .result-box.rating-3{background:linear-gradient(135deg,#fffacd,#fff0a0);border:3px solid #FFD700;}
  .result-box.rating-3 .result-title{color:#7a5c00;}
  .result-box.rating-2{background:linear-gradient(135deg,#d4f5d4,#b7e4b7);border:3px solid #6BCB77;}
  .result-box.rating-2 .result-title{color:#1a5c1a;}
  .result-box.rating-1{background:linear-gradient(135deg,#fde8e8,#fac5c5);border:3px solid #FF6B6B;}
  .result-box.rating-1 .result-title{color:#8b0000;}
  .result-box.rating-0{background:linear-gradient(135deg,#f0f0f0,#e0e0e0);border:3px solid #ccc;}
  .result-box.rating-0 .result-title{color:#555;}

  .btn-next{background:linear-gradient(135deg,var(--mint),#2ec46d);color:white;border:none;
    border-radius:50px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:1rem;
    cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.15);transition:all .15s;margin-top:12px;display:none;}
  .btn-next:active{transform:translateY(4px);box-shadow:none;}

  /* Fallback */
  .fallback-section{display:none;margin-top:12px;background:#fff8e1;border:2px dashed #FFD93D;
    border-radius:14px;padding:12px;}
  .fallback-section.visible{display:block;}
  .fallback-label{font-family:'Fredoka One',cursive;font-size:.9rem;color:#7a5c00;margin-bottom:9px;}
  .fallback-btns{display:flex;gap:7px;justify-content:center;}
  .btn-fb{border:none;border-radius:50px;padding:9px 16px;font-family:'Fredoka One',cursive;
    font-size:.85rem;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.12);transition:all .15s;}
  .btn-fb:active{transform:translateY(2px);box-shadow:none;}
  .btn-fb-3{background:linear-gradient(135deg,#FFD700,#ffa500);color:white;}
  .btn-fb-2{background:linear-gradient(135deg,var(--mint),#2ec46d);color:white;}
  .btn-fb-1{background:linear-gradient(135deg,#FF6B6B,#ee0979);color:white;}

  /* Star burst */
  .star-burst{position:fixed;pointer-events:none;z-index:999;animation:starFly 1.2s ease forwards;}
  @keyframes starFly{0%{transform:scale(0) rotate(0deg);opacity:1;}70%{transform:scale(1.4) rotate(20deg);opacity:1;}100%{transform:scale(.5) translateY(-120px) rotate(-30deg);opacity:0;}}

  /* History */
  .history{background:white;border-radius:20px;padding:14px;box-shadow:0 4px 15px rgba(0,0,0,.08);}
  .history h3{font-family:'Fredoka One',cursive;color:var(--dark);margin-bottom:10px;font-size:1rem;}
  .history-list{display:flex;flex-wrap:wrap;gap:7px;}
  .history-item{background:#f8f8f8;border-radius:12px;padding:5px 10px;font-size:.82rem;
    font-weight:700;display:flex;align-items:center;gap:4px;}

  /* Trophy */
  .trophy-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
    align-items:center;justify-content:center;}
  .trophy-popup.show{display:flex;}
  .trophy-box{background:white;border-radius:28px;padding:32px 24px;text-align:center;
    animation:bounceIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:340px;width:90%;}
  .trophy-emoji{font-size:4.5rem;display:block;animation:wiggle 1s ease infinite;}
  .trophy-box h2{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--dark);margin:8px 0 4px;}
  .trophy-box p{color:#888;font-weight:700;}
  .summary-stars{display:flex;justify-content:center;gap:14px;margin:12px 0 0;}
  .summary-item{text-align:center;font-family:'Fredoka One',cursive;}
  .summary-item .big{font-size:1.5rem;}
  .summary-item .lbl{font-size:.75rem;color:#aaa;}
  .btn-restart{background:linear-gradient(135deg,var(--sun),var(--peach));color:white;border:none;
    border-radius:50px;padding:13px 28px;font-family:'Fredoka One',cursive;font-size:1.1rem;
    cursor:pointer;margin-top:16px;box-shadow:0 4px 0 rgba(0,0,0,.15);}

  /* Empty state */
  .empty-state{text-align:center;padding:30px 16px;color:#aaa;font-family:'Fredoka One',cursive;font-size:1.1rem;}

  @keyframes bounceIn{0%{transform:scale(.7);opacity:0;}80%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
</style>
</head>
<body>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <span class="mascot">🦜</span>
    <h1>Star Speaker</h1>
    <p>เลือกหมวดแล้วพูดให้แม่น รับดาวสูงสุด 3 ดวง! ⭐⭐⭐</p>
  </div>

  <!-- Level tabs -->
  <div class="levels-row">
    <button class="level-btn active" onclick="setLevel(0)">🐣<br>เริ่มต้น</button>
    <button class="level-btn" onclick="setLevel(1)">🐔<br>กลาง</button>
    <button class="level-btn" onclick="setLevel(2)">🦅<br>เก่งมาก</button>
  </div>

  <!-- Score bar -->
  <div class="stars-bar">
    <span class="stars-label">⭐ คะแนนรวม</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="stars-count"><span id="starCount">0</span>&nbsp;/&nbsp;<span id="starMax">15</span>⭐</div>
  </div>

  <!-- Category selector -->
  <div class="cat-section">
    <h3>🗂️ เลือกหมวดหมู่</h3>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- Word card -->
  <div class="card" id="wordCard" style="display:none">
    <div class="card-top">
      <span class="level-badge" id="levelBadge">เริ่มต้น 🐣</span>
      <span class="cat-badge" id="catBadge">สัตว์ 🐾</span>
    </div>
    <span class="word-emoji" id="wordEmoji">🐱</span>
    <div class="word-display" id="wordDisplay">CAT</div>
    <div class="word-phonetic" id="wordPhonetic">แคท</div>
    <div class="word-thai" id="wordThai">แมว</div>

    <div class="attempt-indicator" id="attemptDots">
      <div class="attempt-dot active" id="dot0"></div>
      <div class="attempt-dot" id="dot1"></div>
      <div class="attempt-dot" id="dot2"></div>
    </div>

    <button class="btn-listen" onclick="speakWord()">🔊 ฟังเสียง</button><br>
    <button class="btn-record" id="btnRecord" onclick="startRecording()">
      <span style="font-size:1.3rem">🎤</span>
      <span class="mic-wave">🎵</span>
      <span id="recordLabel">กดแล้วพูดเลย!</span>
    </button>
    <div class="speak-hint" id="speakHint">กดปุ่มแดง แล้วพูดคำนั้นออกมาดังๆ 😊</div>

    <div class="fallback-section" id="fallbackSection">
      <div class="fallback-label">🎤 ไม่พบไมโครโฟน — ให้คะแนนตัวเองนะ!</div>
      <div class="fallback-btns">
        <button class="btn-fb btn-fb-3" onclick="handleRating(3)">⭐⭐⭐<br><small>เยี่ยม!</small></button>
        <button class="btn-fb btn-fb-2" onclick="handleRating(2)">⭐⭐<br><small>ดี!</small></button>
        <button class="btn-fb btn-fb-1" onclick="handleRating(1)">⭐<br><small>พยายาม</small></button>
      </div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="star-rating-display">
        <span class="rating-star" id="rs1">⭐</span>
        <span class="rating-star" id="rs2">⭐</span>
        <span class="rating-star" id="rs3">⭐</span>
      </div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-subtitle" id="resultSubtitle"></div>
      <div class="result-spoken" id="resultSpoken"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextWord()">คำต่อไป ➡️</button>
  </div>

  <!-- History -->
  <div class="history" id="historySection" style="display:none">
    <h3>📝 คำที่ฝึกแล้ว</h3>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- Trophy -->
<div class="trophy-popup" id="trophyPopup">
  <div class="trophy-box">
    <span class="trophy-emoji" id="trophyEmoji">🏆</span>
    <h2 id="trophyTitle">เก่งมากเลย!</h2>
    <p id="trophyMsg"></p>
    <div class="summary-stars" id="summaryStars"></div>
    <button class="btn-restart" onclick="resetRound()">เล่นอีกรอบ! 🔄</button>
  </div>
</div>

<script>
// =========================================================
// DATA — หมวดหมู่ทั้งหมด 3 ระดับ
// =========================================================
const CATEGORIES = {
  animals: {
    name:'สัตว์', emoji:'🐾',
    easy:[
      {word:'CAT',emoji:'🐱',thai:'แมว',phonetic:'แคท'},
      {word:'DOG',emoji:'🐶',thai:'หมา',phonetic:'ด็อก'},
      {word:'FISH',emoji:'🐟',thai:'ปลา',phonetic:'ฟิช'},
      {word:'BIRD',emoji:'🐦',thai:'นก',phonetic:'เบิร์ด'},
      {word:'COW',emoji:'🐮',thai:'วัว',phonetic:'คาว'},
      {word:'PIG',emoji:'🐷',thai:'หมู',phonetic:'พิก'},

    medium:[
      {word:'RABBIT',emoji:'🐰',thai:'กระต่าย',phonetic:'แรบบิท'},
      {word:'MONKEY',emoji:'🐒',thai:'ลิง',phonetic:'มังกี้'},

      {word:'HORSE',emoji:'🐴',thai:'ม้า',phonetic:'ฮอร์ส'},

      {word:'FROG',emoji:'🐸',thai:'กบ',phonetic:'ฟร็อก'},
    ],
    hard:[
      {word:'ELEPHANT',emoji:'🐘',thai:'ช้าง',phonetic:'เอเลแฟนท์'},
      {word:'BUTTERFLY',emoji:'🦋',thai:'ผีเสื้อ',phonetic:'บัตเตอร์ฟลาย'},
      {word:'DINOSAUR',emoji:'🦕',thai:'ไดโนเสาร์',phonetic:'ไดโนซอร์'},
      {word:'CROCODILE',emoji:'🐊',thai:'จระเข้',phonetic:'ครอคโคไดล์'},
      {word:'PENGUIN',emoji:'🐧',thai:'เพนกวิน',phonetic:'เพ็งกวิน'},
      {word:'GIRAFFE',emoji:'🦒',thai:'ยีราฟ',phonetic:'จิราฟ'},

  },
  colors: {

      {word:'BLACK',emoji:'⚫',thai:'สีดำ',phonetic:'แบล็ค'},
      {word:'WHITE',emoji:'⚪',thai:'สีขาว',phonetic:'ไวท์'},
    ],
    medium:[
      {word:'ORANGE',emoji:'🟠',thai:'สีส้ม',phonetic:'ออเรนจ์'},
      {word:'YELLOW',emoji:'🟡',thai:'สีเหลือง',phonetic:'เยลโล่'},
      {word:'PURPLE',emoji:'🟣',thai:'สีม่วง',phonetic:'เพอร์เพิล'},
      {word:'BROWN',emoji:'🟤',thai:'สีน้ำตาล',phonetic:'บราวน์'},
      {word:'GREY',emoji:'🩶',thai:'สีเทา',phonetic:'เกรย์'},
      {word:'GOLD',emoji:'🌟',thai:'สีทอง',phonetic:'โกลด์'},
    ],
    hard:[
      {word:'TURQUOISE',emoji:'🩵',thai:'สีเขียวอมน้ำเงิน',phonetic:'เทอร์คอยส์'},
      {word:'VIOLET',emoji:'💜',thai:'สีม่วงอมน้ำเงิน',phonetic:'ไวโอเลต'},

const WORDS_PER_ROUND = 5;
const LEVEL_KEYS = ['easy','medium','hard'];
const LEVEL_NAMES = ['เริ่มต้น 🐣','กลาง 🐔','เก่งมาก 🦅'];

let currentLevel = 0;
let currentCatKey = null;
let wordQueue = [];
let currentIndex = 0;
let totalStars = 0;
let attemptNo = 0;
let wordDone = false;
let history = [];
let recognition = null;
let isRecording = false;
let hasMic = false;

// ---- Render category grid ----
function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (key === currentCatKey ? ' active' : '');
    btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span>`;
    btn.onclick = () => selectCategory(key);
    grid.appendChild(btn);
  });
}

function selectCategory(key) {
  currentCatKey = key;
  renderCatGrid();
  startRound();
}

function setLevel(lvl) {
  currentLevel = lvl;
  document.querySelectorAll('.level-btn').forEach((b,i) => b.classList.toggle('active', i===lvl));
  if (currentCatKey) startRound();
}

function startRound() {
  const cat = CATEGORIES[currentCatKey];
  const pool = cat[LEVEL_KEYS[currentLevel]];
  wordQueue = shuffle(pool).slice(0, WORDS_PER_ROUND);
  currentIndex = 0;
  totalStars = 0;
  history = [];
  updateScoreBar();
  document.getElementById('historySection').style.display = 'none';
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('wordCard').style.display = 'block';
  showWord();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showWord() {
  if (currentIndex >= wordQueue.length) { showTrophy(); return; }
  attemptNo = 0;
  wordDone = false;
  const w = wordQueue[currentIndex];
  const cat = CATEGORIES[currentCatKey];
  document.getElementById('wordDisplay').textContent = w.word;
  document.getElementById('wordEmoji').textContent = w.emoji;
  document.getElementById('wordThai').textContent = w.thai;
  document.getElementById('wordPhonetic').textContent = w.phonetic;
  document.getElementById('levelBadge').textContent = LEVEL_NAMES[currentLevel];
  document.getElementById('catBadge').textContent = cat.emoji + ' ' + cat.name;
  resetResultUI();
  updateAttemptDots();
  const card = document.getElementById('wordCard');
  card.style.animation = 'none';
  setTimeout(() => card.style.animation = 'slideUp .4s ease', 10);
}

function resetResultUI() {
  const rb = document.getElementById('resultBox');
  rb.className = 'result-box';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnRecord').disabled = false;
  document.getElementById('btnRecord').style.display = 'inline-flex';
  document.getElementById('speakHint').textContent = 'กดปุ่มแดง แล้วพูดคำนั้นออกมาดังๆ 😊';
  document.getElementById('fallbackSection').classList.remove('visible');
}

function updateAttemptDots() {
  for (let i=0;i<3;i++) {
    const d = document.getElementById('dot'+i);
    d.className = 'attempt-dot';
    if (i < attemptNo) d.classList.add('used');
    else if (i === attemptNo) d.classList.add('active');
  }
}

// ---- Audio ----
function speakWord() {
  const w = wordQueue[currentIndex];
  const synth = window.speechSynthesis;
  if (!synth) { setHint('⚠️ เบราว์เซอร์ไม่รองรับ TTS', '#FF6B6B'); return; }

  // Resume AudioContext ถ้า suspended (Android ต้องการ user gesture)
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  // Cancel ที่ค้างอยู่
  synth.cancel();

  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = 'en-US';
  u.rate = 0.72;
  u.pitch = 1.0;
  u.volume = 1.0;

  // หา voice ภาษาอังกฤษ ถ้ามี
  const voices = synth.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en')) || null;
  if (enVoice) u.voice = enVoice;

  u.onerror = (e) => {
    // TTS error — ลอง fallback ด้วย beep + hint
    setHint('🔇 เสียงพูดไม่ออก — ดูคำอ่านข้างล่างนะ 👆', '#FF9671');
    playTone(660, 'sine', 0, 0.1, 0.2);
  };

  synth.speak(u);

  // Android bug: บางครั้ง speak() ไม่ทำงานถ้า voices ยังโหลดไม่เสร็จ
  if (voices.length === 0) {
    synth.onvoiceschanged = () => {
      synth.cancel();
      const v2 = synth.getVoices().find(v => v.lang.startsWith('en')) || null;
      if (v2) u.voice = v2;
      synth.speak(u);
    };
  }
}

// ---- Recording ----
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let micPermission = 'unknown'; // 'unknown' | 'granted' | 'denied'

function setHint(txt, color='#aaa') {
  const el = document.getElementById('speakHint');
  el.textContent = txt;
  el.style.color = color;
}

function setRecordBtn(label, active) {
  const btn = document.getElementById('btnRecord');
  document.getElementById('recordLabel').textContent = label;
  btn.classList.toggle('recording', active);
}

// ขอสิทธิ์ไมค์ล่วงหน้า แสดง status ชัดเจน
async function requestMicPermission() {
  if (!navigator.mediaDevices) return false;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop()); // ขอแล้วปิดทิ้ง
    micPermission = 'granted';
    return true;
  } catch(e) {
    micPermission = 'denied';
    return false;
  }
}

// สร้าง recognition ใหม่ทุกครั้ง (แก้ปัญหา reuse)
function buildRecognition() {
  if (!SpeechRec) return null;
  const r = new SpeechRec();
  r.lang = 'en-US';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 3;
  return r;
}

async function startRecording() {
  if (wordDone) return;
  if (isRecording) {
    if (recognition) { try { recognition.stop(); } catch(e){} }
    stopRecordingUI();
    return;
  }

  // ไม่รองรับ SpeechRecognition เลย
  if (!SpeechRec) { showFallback('เบราว์เซอร์นี้ไม่รองรับไมค์ ใช้ Chrome นะ 🙏'); return; }

  // ยังไม่เคยขอสิทธิ์ — ขอก่อน
  if (micPermission === 'unknown') {
    setRecordBtn('กำลังขอสิทธิ์ไมค์...', false);
    setHint('📋 กรุณากด "Allow" เพื่ออนุญาตไมค์', '#FF9671');
    const ok = await requestMicPermission();
    if (!ok) {
      setRecordBtn('กดแล้วพูดเลย!', false);
      showFallback('ถูกปฏิเสธสิทธิ์ไมค์ — กดให้คะแนนตัวเองแทนนะ 😊');
      return;
    }
  }

  if (micPermission === 'denied') {
    showFallback('ไมค์ถูกบล็อก — เปิดสิทธิ์ในเบราว์เซอร์แล้วลองใหม่ 🔓');
    return;
  }

  // สร้าง recognition ใหม่ทุกรอบ
  recognition = buildRecognition();
  if (!recognition) { showFallback('ไม่รองรับ Speech Recognition 😢'); return; }

  isRecording = true;
  playSoundRecord();
  setRecordBtn('🔴 กำลังฟัง... พูดเลย!', true);
  setHint('🎵 กำลังฟังอยู่... พูดชัดๆ ดังๆ นะ', '#845EC2');

  recognition.onresult = (e) => {
    // รวมทุก alternatives เพื่อเลือกที่ match ที่สุด
    const target = wordQueue[currentIndex]?.word.toUpperCase() || '';
    const alts = Array.from(e.results[0]).map(a => a.transcript.trim()).filter(t => t.length > 0);
    
    // เลือก alt ที่ใกล้เคียง target มากที่สุด
    let best = alts[0] || '';
    let bestScore = -1;
    for (const alt of alts) {
      const s = alt.toUpperCase().replace(/[^A-Z0-9 ]/g,'');
      const sim = charSimilarity(s, target);
      const dist = levenshtein(s, target);
      const score = sim - (dist / Math.max(s.length||1, target.length||1)) * 0.3;
      if (score > bestScore) { bestScore = score; best = alt; }
    }
    
    stopRecordingUI();
    processSpoken(best);
  };

  recognition.onerror = (e) => {
    stopRecordingUI();
    const errMap = {
      'not-allowed':    'ไมค์ถูกบล็อก — เปิดสิทธิ์ในเบราว์เซอร์แล้วลองใหม่ 🔓',
      'no-speech':      '🔇 ไม่ได้ยินเสียง — ลองพูดดังขึ้นนะ',
      'network':        '🌐 ต้องการอินเทอร์เน็ตสำหรับการแปลงเสียง',
      'audio-capture':  '🎤 ไม่พบไมค์ในเครื่อง',
      'aborted':        '',
    };
    const msg = errMap[e.error] || `เกิดข้อผิดพลาด: ${e.error}`;
    if (e.error === 'not-allowed') { micPermission = 'denied'; showFallback(msg); }
    else if (e.error === 'no-speech') { setHint(msg, '#FF6B6B'); }
    else if (e.error !== 'aborted') { showFallback(msg); }
  };

  recognition.onend = () => { stopRecordingUI(); };

  try {
    recognition.start();
  } catch(e) {
    stopRecordingUI();
    showFallback('ไม่สามารถเปิดไมค์ได้ — ลองใหม่อีกครั้ง');
  }
}

function stopRecordingUI() {
  isRecording = false;
  setRecordBtn('กดแล้วพูดเลย!', false);
  if (micPermission === 'granted') {
    setHint('กดปุ่มแดง แล้วพูดคำนั้นออกมาดังๆ 😊', '#aaa');
  }
}

function showFallback(msg='ไม่พบไมโครโฟน — ให้คะแนนตัวเองนะ 😊') {
  document.getElementById('fallbackSection').classList.add('visible');
  document.getElementById('btnRecord').style.display = 'none';
  setHint('⚠️ ' + msg, '#FF6B6B');
}

// ---- Rating ----
function charSimilarity(a, b) {
  if (!a||!b) return 0;
  const sA = new Set(a.replace(/\s/g,'').split(''));
  const sB = new Set(b.replace(/\s/g,'').split(''));
  const inter = [...sA].filter(c=>sB.has(c)).length;
  return inter / Math.max(sA.size, sB.size);
}

function computeRating(spoken, target, attempt) {
  const s = spoken.toUpperCase().trim().replace(/[^A-Z0-9 ]/g,'');
  const t = target.toUpperCase().trim().replace(/[^A-Z0-9 ]/g,'');
  if (!s) return 0;

  // 1) exact / contains
  if (s === t || s.includes(t) || t.includes(s)) return Math.max(1, 3 - attempt);

  // 2) word-level match (สำหรับ multi-word เช่น GOOD MORNING)
  const tWords = t.split(' ');
  const sWords = s.split(' ');
  const wordMatch = tWords.every(tw => sWords.some(sw => sw === tw || levenshtein(sw,tw) <= 1));
  if (wordMatch) return Math.max(1, 3 - attempt);

  // 3) levenshtein distance
  const dist = levenshtein(s, t);
  const ratio = 1 - dist / Math.max(s.length, t.length);
  if (ratio >= 0.80) return Math.max(1, 3 - attempt);
  if (ratio >= 0.60) return Math.max(1, 2 - attempt);

  // 4) char similarity fallback
  const sim = charSimilarity(s, t);
  if (sim >= 0.75) return Math.max(1, 2 - attempt);
  if (sim >= 0.50) return 1;

  return 0;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => Array.from({length: n+1}, (_,j) => i||j));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function processSpoken(spoken) {
  const target = wordQueue[currentIndex].word;
  const rating = computeRating(spoken, target, attemptNo);
  if (rating > 0) {
    handleRating(rating, spoken);
  } else {
    attemptNo++;
    updateAttemptDots();
    if (attemptNo >= 3) {
      handleRating(0, spoken);
    } else {
      playSoundRetry();
      const hints = ['😅 เกือบแล้ว! ลองอีกครั้งนะ','💪 ใกล้มาก! พูดให้ชัดขึ้น','🎯 ฟังเสียงแล้วลองใหม่!'];
      document.getElementById('speakHint').textContent =
        (spoken ? `ได้ยินว่า "${spoken}" — ` : '') + hints[attemptNo-1];
    }
  }
}

// =========================================================
// SOUND ENGINE — Web Audio API (ไม่ต้องโหลดไฟล์)
// =========================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, start, duration, vol=0.3) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
  gain.gain.setValueAtTime(0, ctx.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + duration + 0.05);
}

function playNoise(start, duration, vol=0.15) {
  const ctx = getAudio();
  const bufSize = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<bufSize; i++) data[i] = Math.random()*2-1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 0.5;
  const gain = ctx.createGain();
  src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(vol, ctx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
  src.start(ctx.currentTime + start);
  src.stop(ctx.currentTime + start + duration + 0.05);
}

// 3 ดาว — แตรฉลองขึ้นโน้ต + เอฟเฟคระยิบระยับ
function playSound3Stars() {
  // chord fanfare C-E-G ขึ้นไป
  const notes = [523,659,784,1047];
  notes.forEach((f,i) => {
    playTone(f,'sine', i*0.12, 0.3, 0.35);
    playTone(f*2,'triangle', i*0.12+0.05, 0.15, 0.12);

  // เสียงระยิบ
  [0.55,0.65,0.75,0.85].forEach(t => playNoise(t, 0.08, 0.12));
  // โน้ตปิดท้ายสูง
  playTone(1568,'sine', 0.62, 0.4, 0.3);
  playTone(2093,'triangle', 0.72, 0.3, 0.2);
}

function playSoundRecord() {

function playSoundTrophy() {
  [523,659,784,659,784,1047,1175,1568].forEach((f,i) => {

// =========================================================

function handleRating(rating, spoken='') {
  wordDone = true;
  const w = wordQueue[currentIndex];
  totalStars += rating;
  updateScoreBar();

  // เล่นเสียงตามดาวที่ได้
  if      (rating === 3) playSound3Stars();
  else if (rating === 2) playSound2Stars();
  else if (rating === 1) playSound1Star();
  else                   playSound0Stars();

  const rb = document.getElementById('resultBox');
  rb.className = 'result-box rating-'+rating+' show';
  for (let i=1;i<=3;i++) {
    const el = document.getElementById('rs'+i);
    el.classList.remove('lit','bounce');
    if (i<=rating) setTimeout(()=>{ el.classList.add('lit','bounce'); }, i*200);
  }

  const msgs = {
    3:{title:'🌟 เยี่ยมมาก!',sub:'ออกเสียงได้สมบูรณ์แบบ! ได้ 3 ดาว!'},
    2:{title:'👍 ดีมาก!',sub:'ออกเสียงได้ดี! ได้ 2 ดาว!'},
    1:{title:'😊 พยายามดี!',sub:'ได้ 1 ดาว ลองฝึกอีกนะ!'},
    0:{title:'😅 ไม่เป็นไร!',sub:'ยังไม่ได้ดาวครั้งนี้ ฝึกต่อนะ!'},
  };
  const m = msgs[rating];
  document.getElementById('resultTitle').textContent = m.title;
  document.getElementById('resultSubtitle').textContent = m.sub;
  document.getElementById('resultSpoken').textContent = spoken ? `ได้ยินว่า: "${spoken}"` : '';

  if (rating >= 2) spawnStars(rating);
  document.getElementById('btnNext').style.display = 'inline-block';
  document.getElementById('btnRecord').disabled = true;
  document.getElementById('btnRecord').style.display = 'inline-flex';
  document.getElementById('fallbackSection').classList.remove('visible');
  addHistory(w, rating);
}

function nextWord() { currentIndex++; showWord(); }

function updateScoreBar() {
  const max = WORDS_PER_ROUND * 3;
  document.getElementById('starCount').textContent = totalStars;
  document.getElementById('starMax').textContent = max;
  document.getElementById('progressFill').style.width = Math.min((totalStars/max)*100,100)+'%';
}

function spawnStars(count) {
  const icons = count===3 ? ['🌟','⭐','✨','💫'] : ['⭐','✨'];
  const n = count===3 ? 7 : 4;
  for(let i=0;i<n;i++) setTimeout(()=>{
    const el = document.createElement('div');
    el.className = 'star-burst';
    el.textContent = icons[Math.floor(Math.random()*icons.length)];
    el.style.fontSize = (1.5+Math.random())+'rem';
    el.style.left = (15+Math.random()*70)+'%';
    el.style.top = (15+Math.random()*55)+'%';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
  }, i*100);
}

function addHistory(w, rating) {
  const stars = '⭐'.repeat(rating)||'❌';
  history.unshift({emoji:w.emoji, word:w.word, stars, rating});
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  const colors = ['#ccc','#ff9090','#90d490','#FFD700'];
  list.innerHTML = history.slice(0,12).map(h=>
    `<div class="history-item" style="border:2px solid ${colors[h.rating]}">${h.emoji} ${h.word} ${h.stars}</div>`
  ).join('');
}

function showTrophy() {
  const max = WORDS_PER_ROUND * 3;
  const pct = totalStars/max;
  let emoji='🏆', title='เก่งมากเลย!';
  if(pct===1){emoji='👑';title='สมบูรณ์แบบ!';}
  else if(pct>=.7){emoji='🥇';title='เก่งมากเลย!';}
  else if(pct>=.4){emoji='🥈';title='ดีมาก!';}
  else{emoji='🥉';title='ยังไงก็ฝึกต่อนะ!';}
  document.getElementById('trophyEmoji').textContent = emoji;
  document.getElementById('trophyTitle').textContent = title;
  document.getElementById('trophyMsg').textContent = `ได้ ${totalStars} จาก ${max} ดาว`;
  const cnt3=history.filter(h=>h.rating===3).length;
  const cnt2=history.filter(h=>h.rating===2).length;
  const cnt1=history.filter(h=>h.rating===1).length;
  const cnt0=history.filter(h=>h.rating===0).length;
  document.getElementById('summaryStars').innerHTML = `
    <div class="summary-item"><div class="big">⭐⭐⭐</div><div class="lbl">${cnt3} ครั้ง</div></div>
    <div class="summary-item"><div class="big">⭐⭐</div><div class="lbl">${cnt2} ครั้ง</div></div>
    <div class="summary-item"><div class="big">⭐</div><div class="lbl">${cnt1} ครั้ง</div></div>
    <div class="summary-item"><div class="big">❌</div><div class="lbl">${cnt0} ครั้ง</div></div>
  `;
  document.getElementById('trophyPopup').classList.add('show');
  playSoundTrophy();
  spawnStars(3); setTimeout(()=>spawnStars(3),600);
}

function resetRound() {
  document.getElementById('trophyPopup').classList.remove('show');
  if (currentCatKey) startRound();
}
